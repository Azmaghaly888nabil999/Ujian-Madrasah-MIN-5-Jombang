<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; padding: 20px; }
    .exam-card { background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .question { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container exam-card">
    <h2 class="text-center mb-4">ASESMEN MADRASAH (AM) - IPAS</h2>
    
    <form id="examForm">
      <div class="row mb-4">
        <div class="col-md-4">
          <label>Nama Lengkap</label>
          <input type="text" name="nama" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label>Kelas</label>
          <select name="kelas" class="form-control" required>
            <option value="VI-A">VI-A</option>
            <option value="VI-B">VI-B</option>
          </select>
        </div>
        <div class="col-md-4">
          <label>NISN</label>
          <input type="number" name="nisn" class="form-control" required>
        </div>
      </div>

      <div class="question">
        <p>1. Bagian tumbuhan yang berfungsi menyerap air dan zat hara dari dalam tanah adalah ....</p>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="q1" value="A"> <label>A. Akar</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="q1" value="B"> <label>B. Daun</label>
        </div>
        </div>

      <div class="text-center mt-5">
        <button type="button" onclick="submitExam()" class="btn btn-success btn-lg">Kirim Hasil Ke Drive</button>
      </div>
    </form>
    
    <div id="result" class="mt-4 text-center" style="display:none;">
      <h3>Terima Kasih!</h3>
      <p>Jawaban Anda telah terkirim ke sistem.</p>
      <div class="alert alert-info" id="scoreDisplay"></div>
    </div>
  </div>

  <script>
    function submitExam() {
      const form = document.getElementById('examForm');
      const formData = Object.fromEntries(new FormData(form).entries());
      
      google.script.run.withSuccessHandler(function(res) {
        document.getElementById('examForm').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('scoreDisplay').innerHTML = "Skor Anda: " + res.score;
      }).processExam(formData);
    }
  </script>
</body>
</html>
